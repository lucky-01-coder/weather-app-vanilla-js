<!doctype html>
<html lang="en">
  <head>
    <title>🌦️ ऋतुDarpan</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/dcb8d7c986.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="../assets/images/logo.png" alt="RituDarpan Logo" />
        <h1 class="logo-name">ऋतु<span class="last-name">Darpan</span></h1>
      </div>
      <section id="search-section">
        <p class="city-name"></p>
        <div id="search-box">
          <input
            type="search"
            id="search-input"
            placeholder="Enter city name"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="search-btn" type="button">Search</button>
        </div>
      </section>
    </header>

    <main>
      <section id="weather-card">
        <img id="weather-icon" src="" alt="Weather Icon" />
        <p id="temp-display">Search a city</p>
        <p id="weather-cond"></p>
        <p class="city-name"></p>
        <p id="day-date"></p>
        <hr />
        <p id="feel-like"></p>
      </section>
      <section class="weather-details">
        <div class="detail-card">
          <span class="detail-icon"><i class="fa-solid fa-droplet"></i></span>
          <p>Humidity</p>
          <span id="humidity" class="detail-value"></span>
        </div>
        <div class="detail-card">
          <span class="detail-icon"><i class="fa-solid fa-wind"></i></span>
          <p>Wind Speed</p>
          <span id="wind-speed" class="detail-value"></span>
        </div>
        <div class="detail-card">
          <span class="detail-icon"><i class="fa-solid fa-eye"></i></span>
          <p>Visibility</p>
          <span id="visibility" class="detail-value"></span>
        </div>
        <div class="detail-card">
          <span class="detail-icon"><i class="fa-solid fa-gauge"></i></span>
          <p>Pressure</p>
          <span id="pressure" class="detail-value"></span>
        </div>
        <div class="sun-timing">
          <span class="sun-icon"><i class="fa-solid fa-sun"></i></span>
          <p>Sunrise</p>
          <span id="sun-rise"></span>
        </div>
        <div class="sun-timing">
          <span class="sun-icon"><i class="fa-solid fa-cloud-sun"></i></span>
          <p>Sunset</p>
          <span id="sun-set"></span>
        </div>
      </section>
    </main>
    <!-- <footer class="sun-timing-section"></footer> -->
    <script src="script.js"></script>
  </body>
</html>
