<!doctype html>
<html lang="en">
  <head>
    <title>🌦️ RituDarpan</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/dcb8d7c986.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="../assests/images/logo.png" alt="RituDarpan Logo" />
        <h1 class="logo-name">Ritu<span class="last-name">Darpan</span></h1>
      </div>
    </header>

    <main>
      <section id="search-section">
        <p class="city-name">
          <i class="fa-solid fa-location-dot"></i>Location
        </p>
        <div id="search-box">
          <input
            type="search"
            name="search box"
            id="search-input"
            placeholder="🔍︎ Find Your City"
          />
          <button id="search-btn">Search</button>
        </div>
      </section>
      <section id="weather-card">
        <h1 id="weather-icon">🌦️</h1>
        <p id="temp-display">31°C</p>
        <p id="weather-cond">Sunny</p>
        <p class="city-name">
          <i class="fa-solid fa-location-dot"></i>Location
        </p>
        <p id="day-date">29 June 2026, Monday</p>
        <hr />
        <p id="feel-like">Feels Like 35°C</p>
      </section>
      <section class="weather-details">
        <div class="detail-card">
          <span class="detail-icon"><i class="fa-solid fa-droplet"></i></span>
          <p>Humidity</p>
          <span id="humidity" class="detail-value">62%</span>
        </div>
        <div class="detail-card">
          <span class="detail-icon"><i class="fa-solid fa-wind"></i></span>
          <p>Wind Speed</p>
          <span id="wind-speed" class="detail-value">7 km/h</span>
        </div>
        <div class="detail-card">
          <span class="detail-icon"><i class="fa-solid fa-eye"></i></span>
          <p>Visibility</p>
          <span id="visibility" class="detail-value">3 kms</span>
        </div>
        <div class="detail-card">
          <span class="detail-icon"><i class="fa-solid fa-gauge"></i></span>
          <p>Pressure</p>
          <span id="pressure" class="detail-value">1012 hPa</span>
        </div>
      </section>
    </main>
    <footer class="sun-timing-section">
      <div class="sun-timing">
        <span class="sun-icon"><i class="fa-solid fa-sun"></i></span>
        <p>Sunrise</p>
        <span id="sun-rise">5:18 AM</span>
      </div>
      <div class="sun-timing">
        <span class="sun-icon"><i class="fa-solid fa-cloud-sun"></i></span>
        <p>Sunset</p>
        <span id="sun-set">6:47 PM</span>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
